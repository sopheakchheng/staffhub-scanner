<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StaffHub Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-slate-900 text-white font-sans h-screen w-full overflow-hidden flex flex-col">

    <div id="app-container" class="flex-1 flex flex-col p-6 pt-10 relative">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-xl font-bold flex items-center">
                <i class="ph-fill ph-telegram-logo text-blue-400 mr-2 text-2xl"></i> Mini App
            </h1>
            <p id="clock" class="text-slate-400 font-medium text-sm">--:--</p>
        </div>

        <!-- User Info -->
        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-4 mb-8 flex items-center space-x-3">
            <div id="avatar-initial" class="w-10 h-10 bg-gradient-to-tr from-blue-500 to-indigo-500 rounded-full flex items-center justify-center font-bold text-white shadow-lg">?</div>
            <div>
                <p class="text-xs text-slate-400">Checking in as</p>
                <p id="username-display" class="font-bold">Loading...</p>
            </div>
        </div>

        <!-- Main View: Tap to Scan -->
        <div id="main-view" class="flex-1 flex flex-col items-center justify-center">
            <div class="w-32 h-32 bg-blue-500/10 rounded-full flex items-center justify-center mb-6">
                <i class="ph ph-qr-code text-blue-500 text-6xl"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">Office Check-In</h2>
            <p class="text-slate-400 text-center text-sm mb-12 px-4">Tap the button below to open your camera and scan the HQ QR code.</p>
            
            <button id="btn-open-camera" class="w-full max-w-xs py-5 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold flex items-center justify-center text-lg shadow-lg shadow-blue-500/30 transition-transform active:scale-95">
                <i class="ph-bold ph-camera mr-2 text-2xl"></i> Open Camera
            </button>
        </div>

        <!-- Loading View (When saving to Firebase) -->
        <div id="loading-view" class="hidden flex-1 flex flex-col items-center justify-center">
            <i class="ph ph-spinner animate-spin text-blue-500 text-6xl mb-4"></i>
            <h2 class="text-xl font-bold">Saving to Cloud...</h2>
            <p class="text-slate-400 text-sm mt-2">Please wait</p>
        </div>

        <!-- Success View -->
        <div id="success-view" class="hidden flex-1 flex flex-col items-center justify-center">
            <div class="w-24 h-24 bg-emerald-500/20 rounded-full flex items-center justify-center mb-6">
                <i class="ph-fill ph-check-circle text-emerald-500 text-6xl"></i>
            </div>
            <h2 class="text-3xl font-bold mb-2">Success!</h2>
            <p id="success-message" class="text-slate-400 font-medium text-center">Data saved to Firebase.</p>
            <button id="btn-close" class="mt-12 py-3 px-8 bg-slate-800 text-white rounded-full font-bold">Close App</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ REPLACE WITH YOUR REAL FIREBASE CONFIG AGAIN!
        const firebaseConfig = {
            apiKey: "AIzaSyDFN_q9cYWCAXRyPhhhgTSLfcROvhMV_aY",
            authDomain: "staff-hub-app-763bc.firebaseapp.com",
            projectId: "staff-hub-app-763bc",
            storageBucket: "staff-hub-app-763bc.firebasestorage.app",
            messagingSenderId: "260622679286",
            appId: "1:260622679286:web:3ecfcad29d872e204300d7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 🔒 THE SECRET QR CODE STRING
        const EXPECTED_QR_CODE = "STAFFHUB_HQ_01";

        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe?.user || { username: "desktop_tester", first_name: "Tester" };
        document.getElementById('username-display').innerText = `@${user.username || 'unknown'}`;
        document.getElementById('avatar-initial').innerText = (user.first_name || '?').charAt(0);

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateClock, 60000);
        updateClock();

        // 1. Open Telegram's Native QR Scanner
        document.getElementById('btn-open-camera').addEventListener('click', () => {
            // Check if testing on Desktop, Web, or outside of Telegram
            const platform = tg.platform || "unknown";
            
            if (!tg.initDataUnsafe?.user || platform === "tdesktop" || platform === "web" || platform === "unknown" || platform === "macos") {
                 // Simulate for desktop users
                 tg.showAlert("Camera scan is only available on the Telegram mobile app. Simulating a successful scan for testing...");
                 handleValidQR();
                 return;
            }

            // Real Camera Scanner for Mobile Phones
            if (tg.showScanQrPopup) {
                tg.showScanQrPopup({ text: "Scan the official office QR code." }, function(scannedText) {
                    if (scannedText === EXPECTED_QR_CODE) {
                        tg.closeScanQrPopup();
                        handleValidQR();
                        return true;
                    } else {
                        tg.showAlert("❌ Invalid QR Code! This is not the official HQ QR code.");
                        return false; // keeps scanner open to try again
                    }
                });
            } else {
                tg.showAlert("QR Scanner is not supported on this device.");
            }
        });

        // 2. Ask user Check In or Check Out after valid scan
        function handleValidQR() {
            tg.showPopup({
                title: 'QR Verified!',
                message: 'Are you checking IN or checking OUT?',
                buttons: [
                    { id: 'check-in', type: 'default', text: 'Check In' },
                    { id: 'check-out', type: 'destructive', text: 'Check Out' }
                ]
            }, function(buttonId) {
                if (buttonId) {
                    saveToFirebase(buttonId);
                }
            });
        }

        // 3. Save to Firebase
        async function saveToFirebase(type) {
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('loading-view').classList.remove('hidden');

            try {
                await addDoc(collection(db, "scans"), {
                    name: user.username || "Unknown",
                    firstName: user.first_name || "User",
                    time: document.getElementById('clock').innerText,
                    status: "pending", 
                    location: "HQ Zone",
                    type: type,
                    timestamp: Date.now()
                });

                document.getElementById('loading-view').classList.add('hidden');
                document.getElementById('success-view').classList.remove('hidden');
                document.getElementById('success-message').innerText = `Your ${type.replace('-', ' ')} was recorded.`;
                tg.HapticFeedback.notificationOccurred('success');
                
            } catch (error) {
                console.error("Firebase Error:", error);
                document.getElementById('loading-view').classList.add('hidden');
                document.getElementById('main-view').classList.remove('hidden');
                tg.showAlert("Failed to save. Did you update your Firebase Firestore rules to allow writes?");
            }
        }

        document.getElementById('btn-close').addEventListener('click', () => tg.close());
    </script>
</body>
</html>
